name: Build IPA

on:
workflow_dispatch:
push:
branches:
- main

jobs:
build:
runs-on: macos-latest

```
steps:
  - name: Checkout
    uses: actions/checkout@v4

  - name: Select Xcode
    run: sudo xcode-select -s /Applications/Xcode.app

  - name: Resolve Packages
    run: xcodebuild -resolvePackageDependencies -workspace Portal.xcworkspace

  - name: Archive App
    run: |
      xcodebuild \
      -workspace Portal.xcworkspace \
      -scheme Portal \
      -configuration Release \
      -sdk iphoneos \
      -archivePath $PWD/build/Portal.xcarchive \
      CODE_SIGNING_ALLOWED=NO \
      CODE_SIGNING_REQUIRED=NO \
      CODE_SIGN_IDENTITY="" \
      archive

  - name: Export IPA
    run: |
      xcodebuild -exportArchive \
      -archivePath $PWD/build/Portal.xcarchive \
      -exportOptionsPlist ExportOptions.plist \
      -exportPath $PWD/build

  - name: Upload IPA
    uses: actions/upload-artifact@v4
    with:
      name: ipa
      path: build/*.ipa
```
